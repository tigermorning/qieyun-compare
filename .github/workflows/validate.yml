name: Validate Pulleyblank

on:
  push:
    paths:
      - 'pulleyblank.js'
      - 'zhengzhang.js'
      - 'lib/flag-structure.js'
      - 'validate-pulleyblank.js'
  pull_request:
    paths:
      - 'pulleyblank.js'
      - 'zhengzhang.js'
      - 'lib/flag-structure.js'
      - 'validate-pulleyblank.js'
  schedule:
    - cron: '0 0 * * 0'  # 매주 일요일 자정
  workflow_dispatch:  # 수동 실행 지원

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run validation script
        run: npm run validate

      - name: Upload validation reports
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: |
            validation-report.json
            validation-report.md
          retention-days: 30

      - name: Check for high severity flags
        run: |
          if [ -f validation-report.json ]; then
            HIGH_FLAGS=$(node -e "const r = require('./validation-report.json'); console.log(r.summary.highFlags)")
            if [ "$HIGH_FLAGS" -gt 0 ]; then
              echo "⚠️ Warning: $HIGH_FLAGS high severity flags found"
              echo "Please review validation-report.md for details"
            fi
          fi

  auto-commit:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run validation and commit reports
        run: |
          npm run validate
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add validation-report.json validation-report.md
          git diff --staged --quiet || git commit -m "chore: update validation reports [skip ci]"
          git push
